[project]
name = "tage-hallmarks-workflow"
version = "0.1.0"
description = "tAge and Open Genes Hallmarks of Aging RNA-seq report workflow"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
r-base = ">=4.4,<4.6"
r-data.table = "*"
r-dplyr = "*"
r-tidyr = "*"
r-tibble = "*"
r-stringr = "*"
r-ggplot2 = "*"
r-pheatmap = "*"
r-reticulate = "*"
r-biocmanager = "*"
bioconductor-deseq2 = "*"
bioconductor-gsva = "*"
bioconductor-limma = "*"
bioconductor-biobase = "*"
python = ">=3.10,<3.13"
joblib = "*"
pandas = "*"
scikit-learn = "*"

[tasks]
check-requirements = "Rscript scripts/install_requirements.R --check-only"
install-r-requirements = "Rscript scripts/install_requirements.R"

