[workspace]
name = "tage-hallmarks-workflow"
version = "0.1.0"
description = "tAge and Open Genes Hallmarks of Aging RNA-seq report workflow"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
r-base = ">=4.4,<4.6"
"r-data.table" = "*"
r-dplyr = "*"
r-tidyr = "*"
r-tibble = "*"
r-stringr = "*"
r-ggplot2 = "*"
r-pheatmap = "*"
r-reticulate = "*"
r-biocmanager = "*"
r-remotes = "*"
bioconductor-deseq2 = "*"
bioconductor-gsva = "*"
bioconductor-limma = "*"
bioconductor-biobase = "*"
bioconductor-edger = "*"
python = ">=3.10,<3.13"
git = "*"
# GSVA imports SpatialExperiment in current Bioconductor releases. SpatialExperiment
# imports R magick, so pin ImageMagick to the ABI expected by conda-forge r-magick.
imagemagick = "==7.1.2_25"
libuv = "*"
joblib = "*"
pandas = "*"
scikit-learn = "*"

[tasks]
install-tage = "Rscript -e 'remotes::install_github(\"Gladyshev-Lab/tAge\", upgrade = \"never\", dependencies = c(\"Depends\", \"Imports\", \"LinkingTo\"), build_vignettes = FALSE)'"
check-requirements = "Rscript -e 'pkgs <- c(\"data.table\", \"dplyr\", \"tidyr\", \"tibble\", \"stringr\", \"ggplot2\", \"pheatmap\", \"reticulate\", \"remotes\", \"DESeq2\", \"GSVA\", \"limma\", \"Biobase\", \"edgeR\", \"tAge\"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing)) stop(\"Missing packages: \", paste(missing, collapse = \", \")); message(\"All required R packages are available.\")'"
